name: Inverse Kinematics Solver CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with ruff
      run: |
        ruff check src/ tests/ examples/
    
    - name: Format check with black
      run: |
        black --check src/ tests/ examples/
    
    - name: Type check with mypy
      run: |
        mypy src/ --ignore-missing-imports
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: 3.11
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run basic examples
      run: |
        python examples/basic_examples.py
    
    - name: Run performance benchmark
      run: |
        python -c "
        from src.evaluation.metrics import IKEvaluator
        from src.kinematics import create_ik_solver
        import numpy as np
        
        # Quick benchmark
        solver = create_ik_solver('planar_2r', 'analytical_2r')
        evaluator = IKEvaluator(solver.robot_model)
        test_targets = evaluator.generate_test_targets(100, 'uniform')
        result = evaluator.evaluate_solver(solver, test_targets)
        print(f'Benchmark completed: {result.success_rate:.3f} success rate')
        "
